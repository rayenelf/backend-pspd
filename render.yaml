services:
  - type: web
    name: backend-pspd
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health

    # Disque persistant pour les images uploadées (chat + réservations)
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

    envVars:
      # ── Base de données (TiDB Cloud) ──────────────────────────────────────
      - key: DB_HOST
        value: gateway01.eu-central-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: 4000
      - key: DB_NAME
        value: pspd
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # ── Redis (Upstash) ───────────────────────────────────────────────────
      - key: REDIS_HOST
        value: ace-shad-99840.upstash.io
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: true

      # ── JWT ───────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false

      # ── Upload ───────────────────────────────────────────────────────────
      - key: UPLOAD_DIR
        value: /app/uploads

      # ── CORS / Frontend (Vercel) ──────────────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://front-pspd.vercel.app
      - key: FRONTEND_BASE_URL
        value: https://front-pspd.vercel.app
      - key: FRONTEND_OAUTH_REDIRECT
        value: https://front-pspd.vercel.app/auth/callback

      # ── Email (Resend) ────────────────────────────────────────────────────
      - key: MAIL_RESEND_ENABLED
        value: true
      - key: MAIL_RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: onboarding@resend.dev

      # ── OAuth2 (placeholder si non configuré) ─────────────────────────────
      - key: GOOGLE_CLIENT_ID
        value: placeholder-client-id
      - key: GOOGLE_CLIENT_SECRET
        value: placeholder-secret
      - key: FACEBOOK_CLIENT_ID
        value: placeholder-fb-id
      - key: FACEBOOK_CLIENT_SECRET
        value: placeholder-fb-secret
