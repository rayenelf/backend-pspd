spring.application.name=backend

# ============================================================
# INTERNATIONALISATION (i18n) — FR (défaut) / EN
# Les messages sont résolus depuis messages*.properties selon l'en-tête
# Accept-Language envoyé par le frontend (AcceptHeaderLocaleResolver).
# ============================================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.web.locale=fr
spring.web.locale-resolver=accept-header

# ============================================================
# BASE DE DONNÉES — MySQL
# Variables lues depuis .env (local) ou variables d'env du serveur (prod)
#
# Variables requises :
#   DB_HOST      → localhost (dev) | url-serveur-cloud (prod)
#   DB_PORT      → 3306
#   DB_NAME      → pspd
#   DB_USERNAME  → root (dev) | user dédié (prod)
#   DB_PASSWORD  → ton mot de passe
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pspd}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway — crée et migre les tables automatiquement au démarrage
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# Serveur
# ============================================================
server.port=${PORT:8081}

# ============================================================
# OAuth2 — Connexion Google (tâche Majd — B8)
# Variables requises dans .env :
#   GOOGLE_CLIENT_ID      → xxxx.apps.googleusercontent.com
#   GOOGLE_CLIENT_SECRET  → secret du client OAuth
# URL frontend de redirection après login réussi :
#   FRONTEND_OAUTH_REDIRECT → http://localhost:5173/auth/callback
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Facebook (#7 — gratuit ; nécessite une app Facebook Developers)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:placeholder-fb-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:placeholder-fb-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

app.frontend.oauth-redirect=${FRONTEND_OAUTH_REDIRECT:http://localhost:5173/auth/callback}

# ============================================================
# JWT — secret partagé (tâche collègue B4). Défini ici car le TokenService
# stub OAuth2 l'utilise aussi en attendant TokenServiceImpl.
#
# ⚠️ Le défaut DOIT être identique à JWT_SECRET dans .env : sinon, selon que
# le backend est lancé avec ou sans .env, le secret diffère et TOUS les tokens
# émis avant un redémarrage « autre mode » sont rejetés (401 → déconnexion).
# En prod, surcharger via la variable d'environnement JWT_SECRET.
# ============================================================
app.jwt.secret=${JWT_SECRET:BNVX+VniFeJeR+cAvh6Ps53EKOfIpY+ZNDYtXVh0GhU=}
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7

# ============================================================
# Upload documents légaux (B9 — stockage disque en dev)
# ============================================================
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ============================================================
# Redis — blacklist JWT, sessions/appareils, remember-device
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ============================================================
# Email — vérification compte + notifications sécurité
# En dev : app.mail.smtp.enabled=false → les mails sont LOGGUÉS (gratuit).
# En prod : passer enabled=true et renseigner un SMTP (gratuit possible).
# ============================================================
app.mail.smtp.enabled=${MAIL_SMTP_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@pspd.local}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
