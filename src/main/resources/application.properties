spring.application.name=backend

# ============================================================
# BASE DE DONNÉES — MySQL
# Variables lues depuis .env (local) ou variables d'env du serveur (prod)
#
# Variables requises :
#   DB_HOST      → localhost (dev) | url-serveur-cloud (prod)
#   DB_PORT      → 3306
#   DB_NAME      → pspd
#   DB_USERNAME  → root (dev) | user dédié (prod)
#   DB_PASSWORD  → ton mot de passe
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pspd}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — crée et migre les tables automatiquement au démarrage
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# Serveur
# ============================================================
server.port=${PORT:8080}

