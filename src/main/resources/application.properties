spring.application.name=backend

# ============================================================
# BASE DE DONNÉES — MySQL
# Variables lues depuis .env (local) ou variables d'env du serveur (prod)
#
# Variables requises :
#   DB_HOST      → localhost (dev) | url-serveur-cloud (prod)
#   DB_PORT      → 3306
#   DB_NAME      → pspd
#   DB_USERNAME  → root (dev) | user dédié (prod)
#   DB_PASSWORD  → ton mot de passe
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pspd}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway — crée et migre les tables automatiquement au démarrage
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# Mail — JavaMailSender
# En dev, utilisé pour password reset (console logging si SMTP non configuré)
# ============================================================
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}

# ============================================================
# Serveur
# ============================================================
server.port=${PORT:8081}

# ============================================================
# OAuth2 — Connexion Google (tâche Majd — B8)
# Variables requises dans .env :
#   GOOGLE_CLIENT_ID      → xxxx.apps.googleusercontent.com
#   GOOGLE_CLIENT_SECRET  → secret du client OAuth
# URL frontend de redirection après login réussi :
#   FRONTEND_OAUTH_REDIRECT → http://localhost:5173/auth/callback
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

app.frontend.oauth-redirect=${FRONTEND_OAUTH_REDIRECT:http://localhost:5173/auth/callback}
app.frontend.password-reset-url=${FRONTEND_PASSWORD_RESET_URL:http://localhost:5173/auth/reset-password}

# ============================================================
# JWT — secret partagé (tâche collègue B4). Défini ici car le TokenService
# stub OAuth2 l'utilise aussi en attendant TokenServiceImpl.
# ============================================================
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-min-32-chars-long-0000}
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7

